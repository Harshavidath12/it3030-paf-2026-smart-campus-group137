spring.application.name=backend

# ===== PostgreSQL =====
spring.datasource.url=jdbc:postgresql://localhost:5432/smartcampus
spring.datasource.username=postgres
spring.datasource.password=YOUR_DB_PASSWORD
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
app.jwt.secret=REPLACE_WITH_A_256BIT_BASE64_SECRET_AT_LEAST_32_CHARS
app.jwt.expiration-ms=86400000

# ===== Google OAuth2 (smartcampus-491519) =====
spring.security.oauth2.client.registration.google.client-id=REPLACE_WITH_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=REPLACE_WITH_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile

# ===== CORS =====
app.cors.allowed-origins=http://localhost:3000

# ===== Server =====
server.port=8080
